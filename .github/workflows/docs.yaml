name: Docs to GitHub Pages

on:
  release:
    types:
      - created
  push:
    branches: [ "main" ]

  pull_request:
    branches: [ "main" ]

  workflow_dispatch:

env:
  JVM_VERSION: 25
  JVM_DISTRIBUTION: temurin

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:

  verify-docs:
    if: ${{ github.ref != 'refs/heads/main' }}
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v6
        with:
          submodules: true  # Fetch Hugo themes (true OR recursive)
          fetch-depth: 0    # Fetch all history for .GitInfo and .Lastmod

      - name: Set up JDK ${{ env.JVM_VERSION }}
        uses: actions/setup-java@v5
        with:
          java-version: ${{ env.JVM_VERSION }}
          distribution: ${{ env.JVM_DISTRIBUTION }}

      - name: 🐘Setup Gradle
        uses: gradle/actions/setup-gradle@11d4d83c63a6ce61b32d8a9c4faddbdb04fe9917 # v6.1.0
        with:
          cache-provider: basic

      - name: Generate Dokka Site
        run: |-
          make knit apidocs

  deploy:
    if: ${{ github.ref == 'refs/heads/main' }}
    permissions:
      contents: read
      pages: write      # to deploy to Pages
      id-token: write   # to verify the deployment originates from an appropriate source

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: true  # Fetch Hugo themes (true OR recursive)
          fetch-depth: 0    # Fetch all history for .GitInfo and .Lastmod

      - name: Set up JDK ${{ env.JVM_VERSION }}
        uses: actions/setup-java@v5
        with:
          java-version: ${{ env.JVM_VERSION }}
          distribution: ${{ env.JVM_DISTRIBUTION }}

      - name: 🐘Setup Gradle
        uses: gradle/actions/setup-gradle@11d4d83c63a6ce61b32d8a9c4faddbdb04fe9917 # v6.1.0
        with:
          cache-provider: basic

      - name: Generate Dokka Site
        run: |-
          make knit apidocs

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: mokksy/build/dokka/html

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
