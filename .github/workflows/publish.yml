name: Publish to Maven Central

on:
  workflow_dispatch:

env:
  JVM_VERSION: 17
  JVM_DISTRIBUTION: temurin

jobs:
  publish:
    runs-on: macos-latest
    permissions:
      contents: read
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Set up JDK ${{ env.JVM_VERSION }}
        uses: actions/setup-java@v5
        with:
          java-version: ${{ env.JVM_VERSION }}
          distribution: ${{ env.JVM_DISTRIBUTION }}
          cache: gradle

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Assemble
        run: ./gradlew assemble -x :mokksy:dockerBuildImage -x :integration-tests:jvmTest

      - name: Publish to Maven Central
        run: ./gradlew publishAllPublicationsToMavenCentralRepository -x :mokksy:dockerBuildImage -x :integration-tests:jvmTest
        env:
          ORG_GRADLE_PROJECT_mavenCentralUsername: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          ORG_GRADLE_PROJECT_mavenCentralPassword: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
          ORG_GRADLE_PROJECT_signingInMemoryKey: ${{ secrets.GPG_PRIVATE_KEY }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyPassword: ${{ secrets.GPG_PASSPHRASE }}
